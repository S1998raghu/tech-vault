---
apiVersion: v1
kind: Namespace
metadata:
  name: cyberCo
---

apiVersion: v1
kind: Deployment
metadata:
  name: cache-db
  namespace: cyberCo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cache-db
  template:
    metadata:
      labels:
        app: cache-db
    spec:
      containers:
      - name: special-definition
        image: redis:buster
        ports:
        - containerPort: 6379
      